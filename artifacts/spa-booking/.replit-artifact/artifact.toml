kind = "web"
previewPath = "/"
title = "Spa & Salon Booking"
version = "1.0.0"
id = "artifacts/spa-booking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18723

[services.development]
run = "pnpm --filter @workspace/spa-booking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spa-booking", "run", "build" ]
publicDir = "artifacts/spa-booking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18723"
BASE_PATH = "/"
